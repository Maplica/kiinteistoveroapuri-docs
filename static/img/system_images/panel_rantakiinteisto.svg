<svg xmlns="http://www.w3.org/2000/svg" width="700" height="280" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="280" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="12" y="18" fill="#374151" font-size="11" font-weight="bold">Rantakiinteistön arvio</text>
  <rect x="0" y="22" width="700" height="1" fill="#d1d5db"/>

  <!-- LEFT: inputs -->
  <text x="16" y="52" fill="#374151" font-size="11">Pinta-ala:</text>
  <rect x="150" y="38" width="110" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="158" y="53" fill="#111827" font-size="11">3 000 m²</text>

  <text x="16" y="84" fill="#374151" font-size="11">Perusaluehinta:</text>
  <rect x="150" y="70" width="110" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="158" y="85" fill="#111827" font-size="11">40,00 €/m²</text>

  <text x="16" y="116" fill="#374151" font-size="11">Rantatyyppi:</text>
  <rect x="150" y="102" width="200" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="158" y="117" fill="#111827" font-size="11">Omarantainen (100 % aluehinnasta)</text>

  <!-- Checkbox -->
  <rect x="150" y="134" width="14" height="14" rx="2" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="170" y="146" fill="#374151" font-size="11">Haja-asutusalue (sovella alennuskaava)</text>

  <text x="16" y="174" fill="#374151" font-size="11">Veroprosentti:</text>
  <rect x="150" y="160" width="180" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="158" y="175" fill="#111827" font-size="11">Maapohja – yleinen</text>

  <rect x="150" y="196" width="100" height="24" rx="4" fill="#0a3d7a"/>
  <text x="168" y="212" fill="white" font-size="11">Laske arvio</text>

  <!-- Divider -->
  <line x1="360" y1="30" x2="360" y2="260" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- RIGHT: result -->
  <rect x="376" y="36" width="308" height="68" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="530" y="62" fill="#1d4ed8" font-size="18" font-weight="bold" text-anchor="middle">675 €</text>
  <text x="530" y="82" fill="#374151" font-size="9" text-anchor="middle">Efektiivinen hinta: 30,00 €/m² · Verotusarvo: 67 500 €</text>
  <text x="530" y="96" fill="#374151" font-size="9" text-anchor="middle">Veroprosentti: 1,00 %</text>
</svg>
