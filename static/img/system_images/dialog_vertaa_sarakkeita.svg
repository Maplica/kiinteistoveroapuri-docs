<svg xmlns="http://www.w3.org/2000/svg" width="380" height="195" viewBox="0 0 380 195">
  <defs>
    <linearGradient id="titleBar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3f3f3"/>
      <stop offset="1" stop-color="#e6e6e6"/>
    </linearGradient>
    <linearGradient id="btnBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a9fd8"/>
      <stop offset="1" stop-color="#1e5a8e"/>
    </linearGradient>
  </defs>
  <!-- Window frame -->
  <rect x="0" y="0" width="380" height="195" fill="#f8f9fa" stroke="#999" stroke-width="1"/>
  <!-- Title bar (OS-native gray) -->
  <rect x="0" y="0" width="380" height="30" fill="url(#titleBar)"/>
  <line x1="0" y1="30" x2="380" y2="30" stroke="#c0c0c0" stroke-width="1"/>
  <text x="180" y="19" font-family="Arial, sans-serif" font-size="11" fill="#222" text-anchor="middle">Vertaa sarakkeita</text>
  <rect x="334" y="7" width="38" height="18" rx="2" fill="#e81123"/>
  <text x="353" y="20" font-family="Arial, sans-serif" font-size="11" fill="white" text-anchor="middle">✕</text>
  <!-- Row 1: Sarake A -->
  <text x="12" y="57" font-family="Arial, sans-serif" font-size="10" fill="#333">Sarake A:</text>
  <rect x="100" y="43" width="262" height="22" rx="3" fill="white" stroke="#d0e8f8" stroke-width="1"/>
  <text x="108" y="58" font-family="Arial, sans-serif" font-size="9" fill="#555">kiinteistovero__kunta</text>
  <line x1="342" y1="43" x2="342" y2="65" stroke="#d0e8f8" stroke-width="1"/>
  <text x="354" y="58" font-family="Arial, sans-serif" font-size="8" fill="#888">▼</text>
  <!-- Row 2: Sarake B -->
  <text x="12" y="85" font-family="Arial, sans-serif" font-size="10" fill="#333">Sarake B:</text>
  <rect x="100" y="71" width="262" height="22" rx="3" fill="white" stroke="#d0e8f8" stroke-width="1"/>
  <text x="108" y="86" font-family="Arial, sans-serif" font-size="9" fill="#555">kiinteistovero__vero</text>
  <line x1="342" y1="71" x2="342" y2="93" stroke="#d0e8f8" stroke-width="1"/>
  <text x="354" y="86" font-family="Arial, sans-serif" font-size="8" fill="#888">▼</text>
  <!-- Row 3: Toleranssi -->
  <text x="12" y="113" font-family="Arial, sans-serif" font-size="10" fill="#333">Toleranssi (numeroille):</text>
  <rect x="196" y="99" width="166" height="22" rx="3" fill="white" stroke="#d0e8f8" stroke-width="1"/>
  <text x="204" y="114" font-family="Arial, sans-serif" font-size="9" fill="#aaa">esim. 2 tai 0.5</text>
  <!-- Separator -->
  <line x1="0" y1="137" x2="380" y2="137" stroke="#d8d8d8" stroke-width="1"/>
  <!-- All 3 buttons are blue (QDialogButtonBox with custom styling) -->
  <!-- Palauta (Reset) -->
  <rect x="8" y="147" width="62" height="26" rx="3" fill="url(#btnBlue)" stroke="#1e5a8e" stroke-width="1"/>
  <text x="39" y="164" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Palauta</text>
  <!-- Cancel -->
  <rect x="224" y="147" width="68" height="26" rx="3" fill="url(#btnBlue)" stroke="#1e5a8e" stroke-width="1"/>
  <text x="258" y="164" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">Peruuta</text>
  <!-- OK -->
  <rect x="300" y="147" width="68" height="26" rx="3" fill="url(#btnBlue)" stroke="#1e5a8e" stroke-width="1"/>
  <text x="334" y="164" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white" text-anchor="middle">OK</text>
</svg>
