<svg xmlns="http://www.w3.org/2000/svg" width="700" height="320" font-family="Segoe UI, Arial, sans-serif">
  <rect width="700" height="320" rx="6" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <!-- GroupBox title -->
  <text x="12" y="18" fill="#374151" font-size="11" font-weight="bold">Alennuskaava-laskuri (arvostamislaki §§ 2.5.5 / 2.5.7)</text>
  <rect x="0" y="22" width="700" height="1" fill="#d1d5db"/>

  <!-- LEFT: inputs -->
  <text x="16" y="52" fill="#374151" font-size="11">Pinta-ala:</text>
  <rect x="130" y="38" width="110" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="138" y="53" fill="#111827" font-size="11">2 000 m²</text>

  <text x="16" y="84" fill="#374151" font-size="11">Aluehinta:</text>
  <rect x="130" y="70" width="110" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="138" y="85" fill="#111827" font-size="11">30,00 €/m²</text>

  <text x="16" y="116" fill="#374151" font-size="11">Kaavatyyppi:</text>
  <rect x="130" y="102" width="200" height="22" rx="3" fill="white" stroke="#9ca3af" stroke-width="1"/>
  <text x="138" y="117" fill="#111827" font-size="11">Haja-asutusalue (raja 3 000 m²)</text>

  <rect x="130" y="136" width="130" height="24" rx="4" fill="#0a3d7a"/>
  <text x="148" y="152" fill="white" font-size="11">Laske alennuskaava</text>

  <text x="16" y="182" fill="#888888" font-size="9" font-style="italic">Tavoitearvokerroin (× 0,75) ei sisälly</text>
  <text x="16" y="194" fill="#888888" font-size="9" font-style="italic">tähän laskuriin.</text>

  <!-- Divider -->
  <line x1="360" y1="30" x2="360" y2="300" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- RIGHT: result -->
  <rect x="376" y="36" width="300" height="50" rx="6" fill="#eff6ff" stroke="#bfdbfe" stroke-width="1.5"/>
  <text x="526" y="56" fill="#1d4ed8" font-size="16" font-weight="bold" text-anchor="middle">36 000 €</text>
  <text x="526" y="73" fill="#374151" font-size="9" text-anchor="middle">Efektiivinen hinta: 18,00 €/m² (vyöhykejaon jälkeen)</text>

  <!-- Table header -->
  <rect x="376" y="100" width="300" height="20" fill="#0a3d7a"/>
  <text x="382" y="114" fill="white" font-size="9" font-weight="bold">Vyöhyke</text>
  <text x="448" y="114" fill="white" font-size="9" font-weight="bold">Pinta-ala</text>
  <text x="508" y="114" fill="white" font-size="9" font-weight="bold">Osuus</text>
  <text x="545" y="114" fill="white" font-size="9" font-weight="bold">€/m²</text>
  <text x="590" y="114" fill="white" font-size="9" font-weight="bold">Arvo (€)</text>

  <!-- Row 1 -->
  <rect x="376" y="120" width="300" height="18" fill="#eff6ff"/>
  <text x="382" y="133" fill="#111827" font-size="9">0–2 000 m²</text>
  <text x="448" y="133" fill="#111827" font-size="9">2 000</text>
  <text x="508" y="133" fill="#111827" font-size="9">100 %</text>
  <text x="545" y="133" fill="#111827" font-size="9">18,00</text>
  <text x="590" y="133" fill="#111827" font-size="9">36 000</text>

  <!-- Note row: 3-band example -->
  <text x="382" y="160" fill="#6b7280" font-size="9">(3 000 m²+ raja-alue näyttää 3 vyöhykettä)</text>
</svg>
