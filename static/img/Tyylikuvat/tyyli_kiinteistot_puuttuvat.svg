<svg xmlns="http://www.w3.org/2000/svg" width="260" height="130" viewBox="0 0 260 130">
  <rect width="260" height="130" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Rekisterin kiinteistöt puuttuvat – karttatyyli</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Kuviotäyttö – läpi näkyvä</text>
  <!-- Check (0): orange hatched - simulate with pattern -->
  <defs>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c25e00" stroke-width="2"/>
    </pattern>
    <pattern id="hatch2" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(-45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#c25e00" stroke-width="2"/>
    </pattern>
    <pattern id="crosshatch" patternUnits="userSpaceOnUse" width="8" height="8">
      <line x1="0" y1="0" x2="8" y2="8" stroke="#c25e00" stroke-width="1.5"/>
      <line x1="8" y1="0" x2="0" y2="8" stroke="#c25e00" stroke-width="1.5"/>
    </pattern>
    <pattern id="dots" patternUnits="userSpaceOnUse" width="7" height="7">
      <circle cx="3.5" cy="3.5" r="1.5" fill="#22aa22"/>
    </pattern>
  </defs>
  <!-- Check box with crosshatch -->
  <rect x="10" y="44" width="40" height="32" fill="white" stroke="#c25e00" stroke-width="1.5" rx="1"/>
  <rect x="10" y="44" width="40" height="32" fill="url(#crosshatch)" rx="1"/>
  <text x="58" y="58" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Status: 0 – Tarkistettava</text>
  <text x="58" y="72" font-family="Arial, sans-serif" font-size="10" fill="#555">🟠 Oranssi ristikkokuvio (Check)</text>
  <!-- OK box with dots -->
  <rect x="10" y="88" width="40" height="32" fill="white" stroke="#22aa22" stroke-width="1.5" rx="1"/>
  <rect x="10" y="88" width="40" height="32" fill="url(#dots)" rx="1"/>
  <text x="58" y="102" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Status: 1 – Käsitelty</text>
  <text x="58" y="116" font-family="Arial, sans-serif" font-size="10" fill="#555">🟢 Vihreä pistekuvio (OK)</text>
</svg>
