<svg xmlns="http://www.w3.org/2000/svg" width="260" height="130" viewBox="0 0 260 130">
  <rect width="260" height="130" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Kaava-alue</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Polygoni – kaavalaji 4 luokkaa</text>
  <!-- NONE: yellow -->
  <rect x="10" y="40" width="22" height="18" fill="#fff600" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="53" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">NONE</text>
  <text x="105" y="53" font-family="Arial, sans-serif" font-size="10" fill="#666">– Ei kaava-aluetta</text>
  <!-- SHORE: blue -->
  <rect x="10" y="64" width="22" height="18" fill="#36b2ff" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="77" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">SHORE</text>
  <text x="105" y="77" font-family="Arial, sans-serif" font-size="10" fill="#666">– Rantakaava</text>
  <!-- TOWN: pink-violet -->
  <rect x="10" y="88" width="22" height="18" fill="#c032c8" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="101" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">TOWN</text>
  <text x="105" y="101" font-family="Arial, sans-serif" font-size="10" fill="#666">– Asemakaava</text>
  <!-- NULL: gray -->
  <rect x="10" y="112" width="22" height="14" fill="#aaaaaa" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="123" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">NULL</text>
  <text x="105" y="123" font-family="Arial, sans-serif" font-size="10" fill="#666">– Tieto puuttuu</text>
</svg>
