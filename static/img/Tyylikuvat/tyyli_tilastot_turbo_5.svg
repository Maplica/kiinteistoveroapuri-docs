<svg xmlns="http://www.w3.org/2000/svg" width="260" height="160" viewBox="0 0 260 160">
  <rect width="260" height="160" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Rakennukset_Tilastot – Kiinteistövero</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Turbo-värirampi – 5 luokkaa (summa €/alue)</text>
  <!-- 5 classes -->
  <rect x="10" y="40" width="22" height="20" fill="#30123b" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="54" font-family="Arial, sans-serif" font-size="10" fill="#333">0 – 150 000 €</text>
  <rect x="10" y="64" width="22" height="20" fill="#28bceb" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="78" font-family="Arial, sans-serif" font-size="10" fill="#333">150 000 – 500 000 €</text>
  <rect x="10" y="88" width="22" height="20" fill="#a4fc3c" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="102" font-family="Arial, sans-serif" font-size="10" fill="#333">500 000 – 1 000 000 €</text>
  <rect x="10" y="112" width="22" height="20" fill="#fb7e21" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="126" font-family="Arial, sans-serif" font-size="10" fill="#333">1 000 000 – 1 500 000 €</text>
  <rect x="10" y="136" width="22" height="14" fill="#7a0403" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="148" font-family="Arial, sans-serif" font-size="10" fill="#333">1 500 000 € +</text>
  <!-- gradient bar on right -->
  <defs>
    <linearGradient id="turbo5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#30123b"/>
      <stop offset="25%"  stop-color="#28bceb"/>
      <stop offset="50%"  stop-color="#a4fc3c"/>
      <stop offset="75%"  stop-color="#fb7e21"/>
      <stop offset="100%" stop-color="#7a0403"/>
    </linearGradient>
  </defs>
  <rect x="215" y="40" width="18" height="110" fill="url(#turbo5)" stroke="#999" stroke-width="0.5" rx="2"/>
</svg>
