<svg xmlns="http://www.w3.org/2000/svg" width="260" height="110" viewBox="0 0 260 110">
  <rect width="260" height="110" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Ranta</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Polygoni – rantastatusluokka</text>
  <!-- NO SHORE: dark green -->
  <rect x="10" y="40" width="22" height="18" fill="#06aa00" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="53" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">NO SHORE</text>
  <text x="130" y="53" font-family="Arial, sans-serif" font-size="10" fill="#666">– Ei rantaviivaa</text>
  <!-- SHORE: cyan -->
  <rect x="10" y="64" width="22" height="18" fill="#00efff" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="77" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">SHORE</text>
  <text x="130" y="77" font-family="Arial, sans-serif" font-size="10" fill="#666">– Rantakiinteistö</text>
  <!-- NULL: gray -->
  <rect x="10" y="88" width="22" height="14" fill="#aaaaaa" stroke="#888" stroke-width="0.8" rx="1"/>
  <text x="38" y="99" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">NULL</text>
  <text x="130" y="99" font-family="Arial, sans-serif" font-size="10" fill="#666">– Tieto puuttuu</text>
</svg>
