<svg xmlns="http://www.w3.org/2000/svg" width="260" height="210" viewBox="0 0 260 210">
  <rect width="260" height="210" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Rakennukset_Yhdistetty – Tyyli 1</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Pinta-alaero – ikonin koko kertoo poikkeaman</text>
  <!-- Show different sizes -->
  <!-- Very large (negative, critical) -->
  <circle cx="28" cy="60" r="22" fill="none" stroke="#4060cc" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="58" y="58" font-family="Arial, sans-serif" font-size="10" fill="#333">Erittäin suuri ero</text>
  <text x="58" y="71" font-family="Arial, sans-serif" font-size="9" fill="#666">Vero &lt; -18 000 m² vs rekisteri</text>
  <!-- Large -->
  <circle cx="28" cy="102" r="15" fill="none" stroke="#4060cc" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="58" y="99" font-family="Arial, sans-serif" font-size="10" fill="#333">Suuri ero</text>
  <text x="58" y="112" font-family="Arial, sans-serif" font-size="9" fill="#666">−500 – −18 000 m²</text>
  <!-- Medium -->
  <circle cx="28" cy="136" r="9" fill="none" stroke="#4060cc" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="58" y="134" font-family="Arial, sans-serif" font-size="10" fill="#333">Normaali / OK</text>
  <text x="58" y="147" font-family="Arial, sans-serif" font-size="9" fill="#666">−25 – +25 m² (täsmää)</text>
  <!-- Small -->
  <circle cx="28" cy="165" r="5" fill="none" stroke="#cc4020" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="58" y="163" font-family="Arial, sans-serif" font-size="10" fill="#333">Pieni ero</text>
  <text x="58" y="176" font-family="Arial, sans-serif" font-size="9" fill="#666">+25 – +500 m²</text>
  <!-- Info note -->
  <rect x="10" y="188" width="240" height="18" fill="#f0f0f0" rx="3"/>
  <text x="130" y="200" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Ikonin muoto = rakennustyyppi (21 eri rakennusluokkaa)</text>
</svg>
