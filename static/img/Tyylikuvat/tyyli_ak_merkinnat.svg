<svg xmlns="http://www.w3.org/2000/svg" width="500" height="570" viewBox="0 0 500 570">
  <rect width="500" height="570" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="250" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">AK-merkinnät</text>
  <text x="250" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Polygoni – kaavan mukainen käyttötarkoitus</text>

  <!-- Row 1: A group – fill rgb(210,188,141), solid outline rgb(35,35,35) -->
  <rect x="10" y="42" width="22" height="18" fill="rgb(210,188,141)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="55" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">A, AH, AM, AO, AP, AR</text>
  <text x="200" y="55" font-family="Arial, sans-serif" font-size="9" fill="#666">– Asuntoalueet (pientalovaltaiset)</text>

  <!-- Row 2: AK group – fill rgb(181,133,89), solid outline rgb(35,35,35) -->
  <rect x="10" y="65" width="22" height="18" fill="rgb(181,133,89)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="78" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">AK, AL</text>
  <text x="200" y="78" font-family="Arial, sans-serif" font-size="9" fill="#666">– Kerrostalo- ja asuntola-alueet</text>

  <!-- Row 3: C – fill rgb(196,47,70), solid outline rgb(35,35,35) -->
  <rect x="10" y="88" width="22" height="18" fill="rgb(196,47,70)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="101" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">C</text>
  <text x="200" y="101" font-family="Arial, sans-serif" font-size="9" fill="#666">– Liike- ja toimistokeskustat</text>

  <!-- Row 4: E group – fill rgb(241,137,183), dash-dot-dot outline -->
  <rect x="10" y="111" width="22" height="18" fill="rgb(241,137,183)" stroke="rgb(35,35,35)" stroke-width="1.5" stroke-dasharray="4,1.5,1,1.5" rx="1"/>
  <text x="38" y="124" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">E, EA, EJ, EK, EMT, EN, EO, EP, ET</text>
  <text x="200" y="124" font-family="Arial, sans-serif" font-size="9" fill="#666">– Erityisalueet</text>

  <!-- Row 5: EH group – fill rgb(0,189,188), dash-dot-dot outline -->
  <rect x="10" y="134" width="22" height="18" fill="rgb(0,189,188)" stroke="rgb(35,35,35)" stroke-width="1.5" stroke-dasharray="4,1.5,1,1.5" rx="1"/>
  <text x="38" y="147" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">EH, EV</text>
  <text x="200" y="147" font-family="Arial, sans-serif" font-size="9" fill="#666">– Erityiset huolto- ja virkistysalueet</text>

  <!-- Row 6: K group – fill rgb(237,130,46), solid outline -->
  <rect x="10" y="157" width="22" height="18" fill="rgb(237,130,46)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="170" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">K, KL, KM, KT, KTY, P, PL, PV</text>
  <text x="200" y="170" font-family="Arial, sans-serif" font-size="9" fill="#666">– Kauppa- ja pysäköintialueet</text>

  <!-- Row 7: L group – fill rgb(255,255,255), solid outline rgb(214,0,48) -->
  <rect x="10" y="180" width="22" height="18" fill="rgb(255,255,255)" stroke="rgb(214,0,48)" stroke-width="1.5" rx="1"/>
  <text x="38" y="193" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">L, LP, LR, LS, LT, LV, LK, LL</text>
  <text x="200" y="193" font-family="Arial, sans-serif" font-size="9" fill="#666">– Liikennealueet</text>

  <!-- Row 8: LH group – fill rgb(240,180,185), solid outline rgb(35,35,35) -->
  <rect x="10" y="203" width="22" height="18" fill="rgb(240,180,185)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="216" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">LH, LPA, LPY, LTA, LHA</text>
  <text x="200" y="216" font-family="Arial, sans-serif" font-size="9" fill="#666">– Lähiliikenne- ja huoltoalueet</text>

  <!-- Row 9: M – fill rgb(195,213,94), solid outline -->
  <rect x="10" y="226" width="22" height="18" fill="rgb(195,213,94)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="239" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">M</text>
  <text x="200" y="239" font-family="Arial, sans-serif" font-size="9" fill="#666">– Maa- ja metsätalousalue</text>

  <!-- Row 10: MA – fill rgb(255,228,0), solid outline -->
  <rect x="10" y="249" width="22" height="18" fill="rgb(255,228,0)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="262" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">MA</text>
  <text x="200" y="262" font-family="Arial, sans-serif" font-size="9" fill="#666">– Maatalousalue</text>

  <!-- Row 11: ME, MP – fill rgb(189,192,89), solid outline -->
  <rect x="10" y="272" width="22" height="18" fill="rgb(189,192,89)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="285" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">ME, MP</text>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="9" fill="#666">– Metsätalousalueet</text>

  <!-- Row 12: MT – fill rgb(214,222,147), solid outline -->
  <rect x="10" y="295" width="22" height="18" fill="rgb(214,222,147)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="308" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">MT</text>
  <text x="200" y="308" font-family="Arial, sans-serif" font-size="9" fill="#666">– Maa- ja metsätalousalue (erityismääräyksin)</text>

  <!-- Row 13: MU, MY – fill rgb(102,181,88), solid outline -->
  <rect x="10" y="318" width="22" height="18" fill="rgb(102,181,88)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="331" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">MU, MY</text>
  <text x="200" y="331" font-family="Arial, sans-serif" font-size="9" fill="#666">– Ulkoilu- ja yhteistoiminta-alueet</text>

  <!-- Row 14: R group – fill rgb(255,209,73), solid outline -->
  <rect x="10" y="341" width="22" height="18" fill="rgb(255,209,73)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="354" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">R, RA, RP, RL, RM</text>
  <text x="200" y="354" font-family="Arial, sans-serif" font-size="9" fill="#666">– Retkeily- ja loma-alueet</text>

  <!-- Row 15: S group – fill rgb(133,210,205), solid outline -->
  <rect x="10" y="364" width="22" height="18" fill="rgb(133,210,205)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="377" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">S, SL, SM, SR</text>
  <text x="200" y="377" font-family="Arial, sans-serif" font-size="9" fill="#666">– Suojelualueet</text>

  <!-- Row 16: T group – fill rgb(172,170,165), solid outline -->
  <rect x="10" y="387" width="22" height="18" fill="rgb(172,170,165)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="400" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">T, T/KEM, TT, TV, TY</text>
  <text x="200" y="400" font-family="Arial, sans-serif" font-size="9" fill="#666">– Teollisuusalueet</text>

  <!-- Row 17: V group – fill rgb(70,165,50), solid outline -->
  <rect x="10" y="410" width="22" height="18" fill="rgb(70,165,50)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="423" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">V, VK, VL, VP, VR, VU, VV</text>
  <text x="200" y="423" font-family="Arial, sans-serif" font-size="9" fill="#666">– Virkistysalueet</text>

  <!-- Row 18: W – fill rgb(162,206,231), solid outline -->
  <rect x="10" y="433" width="22" height="18" fill="rgb(162,206,231)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="446" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">W</text>
  <text x="200" y="446" font-family="Arial, sans-serif" font-size="9" fill="#666">– Vesialueet</text>

  <!-- Row 19: Y group – fill rgb(205,175,227), solid outline -->
  <rect x="10" y="456" width="22" height="18" fill="rgb(205,175,227)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="469" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">Y, YH, YK, YL, YM, YO, YS, YU, YY</text>
  <text x="200" y="469" font-family="Arial, sans-serif" font-size="9" fill="#666">– Yleisten rakennusten alueet</text>

  <!-- Row 20: NULL – fill rgb(255,255,255), solid outline rgb(35,35,35) -->
  <rect x="10" y="479" width="22" height="18" fill="rgb(255,255,255)" stroke="rgb(35,35,35)" stroke-width="1.5" rx="1"/>
  <text x="38" y="492" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">NULL</text>
  <text x="200" y="492" font-family="Arial, sans-serif" font-size="9" fill="#666">– Tieto puuttuu</text>

  <!-- Row 21: empty – fill rgb(255,255,255), solid outline rgb(38,89,128) -->
  <rect x="10" y="502" width="22" height="18" fill="rgb(255,255,255)" stroke="rgb(38,89,128)" stroke-width="1.5" rx="1"/>
  <text x="38" y="515" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#333">(tyhjä)</text>
  <text x="200" y="515" font-family="Arial, sans-serif" font-size="9" fill="#666">– Ei arvoa</text>

  <!-- Note about dashed outline -->
  <text x="10" y="540" font-family="Arial, sans-serif" font-size="8" fill="#888" font-style="italic">* Katkoviiva = erityisalueet (E- ja EH-alkuiset ryhmät)</text>
  <text x="10" y="554" font-family="Arial, sans-serif" font-size="8" fill="#888" font-style="italic">Kenttä: Kaavan mukainen käyttötarkoitus__vero (ylätapaukset)</text>
</svg>
