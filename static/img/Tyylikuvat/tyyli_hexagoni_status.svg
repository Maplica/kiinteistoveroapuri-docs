<svg xmlns="http://www.w3.org/2000/svg" width="260" height="120" viewBox="0 0 260 120">
  <rect width="260" height="120" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Rekisterin rakennukset – karttatyyli</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Kuusikulmio – Status-arvo</text>
  <!-- Row 1: Check (orange) hexagon -->
  <!-- Pointy-top hexagon cx=28 cy=62 r=18 -->
  <polygon points="28,44 43.6,53 43.6,71 28,80 12.4,71 12.4,53"
           fill="#ff7700" stroke="#000000" stroke-width="0.8"/>
  <!-- Inner light hexagon r=8 -->
  <polygon points="28,54 34.9,57.5 34.9,64.5 28,68 21.1,64.5 21.1,57.5"
           fill="#fff1e5" stroke="none"/>
  <text x="54" y="63" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Status: 0 – Tarkistettava</text>
  <text x="54" y="76" font-family="Arial, sans-serif" font-size="10" fill="#555">🟠 Oranssi kuusikulmio (Check)</text>
  <!-- Row 2: OK (green) hexagon -->
  <!-- cx=28 cy=102 r=18 -->
  <polygon points="28,84 43.6,93 43.6,111 28,120 12.4,111 12.4,93"
           fill="#00ba08" stroke="#000000" stroke-width="0.8"/>
  <polygon points="28,94 34.9,97.5 34.9,104.5 28,108 21.1,104.5 21.1,97.5"
           fill="#00ba08" stroke="none"/>
  <text x="54" y="102" font-family="Arial, sans-serif" font-size="11" fill="#333" font-weight="bold">Status: "" – Käsitelty</text>
  <text x="54" y="115" font-family="Arial, sans-serif" font-size="10" fill="#555">🟢 Vihreä kuusikulmio (OK)</text>
</svg>
