    </linearGradient>
  </defs>
  <rect x="10" y="44" width="240" height="28" fill="url(#hsv)" stroke="#999" stroke-width="0.5" rx="2"/>
  <text x="10"  y="86" font-family="Arial, sans-serif" font-size="9" fill="#555">Alhaisin €-arvo</text>
  <text x="130" y="86" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="middle">Satunnaisväri per aluehinta-luokka</text>
  <text x="250" y="86" font-family="Arial, sans-serif" font-size="9" fill="#555" text-anchor="end">Korkein €-arvo</text>
