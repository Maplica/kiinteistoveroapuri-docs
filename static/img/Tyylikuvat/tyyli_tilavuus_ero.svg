<svg xmlns="http://www.w3.org/2000/svg" width="260" height="240" viewBox="0 0 260 240">
  <rect width="260" height="240" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Rakennukset_Tilastot – Tilavuusero</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Divergoiva värirampi (vero − tietokanta, m³)</text>
  <!-- 9 classes -->
  <rect x="10" y="40" width="22" height="20" fill="#30123b" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="54" font-family="Arial, sans-serif" font-size="10" fill="#333">–∞ – –6 000 m³</text>
  <rect x="10" y="64" width="22" height="20" fill="#466be3" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="78" font-family="Arial, sans-serif" font-size="10" fill="#333">–6 000 – –1 000 m³</text>
  <rect x="10" y="88" width="22" height="20" fill="#28bceb" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="102" font-family="Arial, sans-serif" font-size="10" fill="#333">–1 000 – –200 m³</text>
  <rect x="10" y="112" width="22" height="20" fill="#1be5b5" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="126" font-family="Arial, sans-serif" font-size="10" fill="#333">–200 – –50 m³</text>
  <rect x="10" y="136" width="22" height="20" fill="#a4fc3c" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="150" font-family="Arial, sans-serif" font-size="10" fill="#333">–50 – 50 m³ (nollaero)</text>
  <rect x="10" y="160" width="22" height="20" fill="#d0ec30" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="174" font-family="Arial, sans-serif" font-size="10" fill="#333">50 – 200 m³</text>
  <rect x="10" y="184" width="22" height="20" fill="#fbb938" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="198" font-family="Arial, sans-serif" font-size="10" fill="#333">200 – 500 m³</text>
  <rect x="10" y="208" width="22" height="20" fill="#e3440a" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="222" font-family="Arial, sans-serif" font-size="10" fill="#333">500 – 1 000 m³</text>
  <rect x="10" y="228" width="22" height="10" fill="#7a0403" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="237" font-family="Arial, sans-serif" font-size="10" fill="#333">1 000 + m³</text>
  <!-- gradient bar on right -->
  <defs>
    <linearGradient id="div9v" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#30123b"/>
      <stop offset="25%"  stop-color="#466be3"/>
      <stop offset="50%"  stop-color="#a4fc3c"/>
      <stop offset="75%"  stop-color="#fbb938"/>
      <stop offset="100%" stop-color="#7a0403"/>
    </linearGradient>
  </defs>
  <rect x="215" y="40" width="18" height="198" fill="url(#div9v)" stroke="#999" stroke-width="0.5" rx="2"/>
  <text x="218" y="140" font-family="Arial, sans-serif" font-size="9" fill="#333" text-anchor="middle">0</text>
  <line x1="210" y1="139" x2="233" y2="139" stroke="#333" stroke-width="0.8" stroke-dasharray="2,2"/>
</svg>
