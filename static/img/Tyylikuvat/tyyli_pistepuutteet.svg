<svg xmlns="http://www.w3.org/2000/svg" width="260" height="125" viewBox="0 0 260 125">
  <rect width="260" height="125" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Pistepuutteet – karttatyyli</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Kiinteistöpolygoni – rakennusmäärän vertailu</text>
  <!-- Row 0: yellow -->
  <rect x="10" y="42" width="24" height="20" fill="#fcf403" stroke="#555555" stroke-width="0.8" rx="1"/>
  <text x="42" y="53" font-family="Arial, sans-serif" font-size="11" fill="#333">Verotuksessa enemmän rakennuksia</text>
  <text x="42" y="65" font-family="Arial, sans-serif" font-size="10" fill="#666">Rekisteristä puuttuu rakennuksia</text>
  <!-- Row 1: magenta -->
  <rect x="10" y="76" width="24" height="20" fill="#fe01a6" stroke="#555555" stroke-width="0.8" rx="1"/>
  <text x="42" y="87" font-family="Arial, sans-serif" font-size="11" fill="#333">Tietokannassa enemmän rakennuksia</text>
  <text x="42" y="99" font-family="Arial, sans-serif" font-size="10" fill="#666">Verotuksesta puuttuu rakennuksia</text>
  <!-- Row 2: green -->
  <rect x="10" y="108" width="24" height="14" fill="#65ec00" stroke="#555555" stroke-width="0.8" rx="1"/>
  <text x="42" y="119" font-family="Arial, sans-serif" font-size="11" fill="#333">Rakennusmäärä täsmää</text>
</svg>
