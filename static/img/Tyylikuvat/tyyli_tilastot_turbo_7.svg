<svg xmlns="http://www.w3.org/2000/svg" width="260" height="200" viewBox="0 0 260 200">
  <rect width="260" height="200" fill="white" stroke="#cccccc" stroke-width="1" rx="4"/>
  <text x="130" y="18" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#333">Rakennukset_Tilastot – Kiinteistövero</text>
  <text x="130" y="31" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" fill="#666">Turbo-värirampi – 7 luokkaa (keskiarvo €/rakennus)</text>
  <!-- 7 classes -->
  <rect x="10" y="40" width="22" height="20" fill="#30123b" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="54" font-family="Arial, sans-serif" font-size="10" fill="#333">0 – 250 €</text>
  <rect x="10" y="64" width="22" height="20" fill="#4686fb" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="78" font-family="Arial, sans-serif" font-size="10" fill="#333">250 – 500 €</text>
  <rect x="10" y="88" width="22" height="20" fill="#1be5b5" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="102" font-family="Arial, sans-serif" font-size="10" fill="#333">500 – 1 000 €</text>
  <rect x="10" y="112" width="22" height="20" fill="#a4fc3c" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="126" font-family="Arial, sans-serif" font-size="10" fill="#333">1 000 – 2 500 €</text>
  <rect x="10" y="136" width="22" height="20" fill="#fbb938" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="150" font-family="Arial, sans-serif" font-size="10" fill="#333">2 500 – 5 000 €</text>
  <rect x="10" y="160" width="22" height="20" fill="#e3440a" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="174" font-family="Arial, sans-serif" font-size="10" fill="#333">5 000 – 7 500 €</text>
  <rect x="10" y="184" width="22" height="14" fill="#7a0403" stroke="#555" stroke-width="0.5" rx="1"/>
  <text x="38" y="195" font-family="Arial, sans-serif" font-size="10" fill="#333">7 500 € +</text>
  <!-- gradient bar on right -->
  <defs>
    <linearGradient id="turbo7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#30123b"/>
      <stop offset="17%"  stop-color="#4686fb"/>
      <stop offset="34%"  stop-color="#1be5b5"/>
      <stop offset="51%"  stop-color="#a4fc3c"/>
      <stop offset="67%"  stop-color="#fbb938"/>
      <stop offset="84%"  stop-color="#e3440a"/>
      <stop offset="100%" stop-color="#7a0403"/>
    </linearGradient>
  </defs>
  <rect x="215" y="40" width="18" height="158" fill="url(#turbo7)" stroke="#999" stroke-width="0.5" rx="2"/>
  <text x="237" y="44" font-family="Arial, sans-serif" font-size="9" fill="#666">matala</text>
  <text x="237" y="200" font-family="Arial, sans-serif" font-size="9" fill="#666">korkea</text>
</svg>
